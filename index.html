document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

 font-size:15px; letter-spacing:0.3px; padding:16px 30px;\" style-hover=\"background:#dcc188;\">Обсудить задачу\n            <span style=\"font-family:'Playfair Display',serif;\">→<\u002Fspan>\n          <\u002Fa>\n          <span style=\"font-size:15px; color:#8da0bc;\">или позвоните <a href=\"tel:+74950000000\" style=\"color:#fff; border-bottom:1px solid var(--accent,#c8a96a); padding-bottom:2px;\">+7 495 000-00-00<\u002Fa><\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <sc-if value=\"{{ showHeroPhoto }}\" hint-placeholder-val=\"{{ true }}\">\n        <div style=\"position:relative;\">\n          <div style=\"position:absolute; top:18px; left:18px; right:-18px; bottom:-18px; border:1px solid var(--accent,#c8a96a); z-index:0;\"><\u002Fdiv>\n          <image-slot id=\"hero-office\" src=\"6c023006-f7c6-4b1c-8405-3dd6b66ebeff\" style=\"position:relative; z-index:1; width:100%; height:480px; display:block;\" shape=\"rect\" fit=\"cover\" placeholder=\"Перетащите фото офиса или партнёров\"><\u002Fimage-slot>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ABOUT / PRINCIPLES -->\n  <section id=\"about\" style=\"background:#f5f3ee;\">\n    <div style=\"max-width:1180px; margin:0 auto; padding:92px 40px;\">\n      <div style=\"max-width:760px; margin-bottom:64px;\">\n        <span style=\"font-size:12.5px; letter-spacing:3.4px; text-transform:uppercase; color:#9a7b3f;\">О практике<\u002Fspan>\n        <p style=\"font-family:'Playfair Display',serif; font-weight:500; font-size:30px; line-height:1.4; color:#1c2738; margin:22px 0 0; text-wrap:pretty;\">Небольшая практика двух партнёров. Каждым делом занимается партнёр лично — без передачи на младших сотрудников и без потери контекста.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"display:grid; grid-template-columns:repeat(3, 1fr); gap:1px; background:#ddd6c8; border:1px solid #ddd6c8;\">\n        <div style=\"background:#f5f3ee; padding:38px 34px;\">\n          <span style=\"font-family:'Playfair Display',serif; font-size:22px; color:var(--accent,#c8a96a);\">01<\u002Fspan>\n          <h3 style=\"font-size:18px; font-weight:700; color:#1c2738; margin:16px 0 10px;\">Конфиденциальность<\u002Fh3>\n          <p style=\"font-size:15px; line-height:1.6; color:#5d6675; margin:0;\">Адвокатская тайна и строгий режим работы с документами клиента на всех этапах.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"background:#f5f3ee; padding:38px 34px;\">\n          <span style=\"font-family:'Playfair Display',serif; font-size:22px; color:var(--accent,#c8a96a);\">02<\u002Fspan>\n          <h3 style=\"font-size:18px; font-weight:700; color:#1c2738; margin:16px 0 10px;\">Системный подход<\u002Fh3>\n          <p style=\"font-size:15px; line-height:1.6; color:#5d6675; margin:0;\">Оцениваем правовые и финансовые риски в комплексе, а не отдельный документ.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"background:#f5f3ee; padding:38px 34px;\">\n          <span style=\"font-family:'Playfair Display',serif; font-size:22px; color:var(--accent,#c8a96a);\">03<\u002Fspan>\n          <h3 style=\"font-size:18px; font-weight:700; color:#1c2738; margin:16px 0 10px;\">Ответственность<\u002Fh3>\n          <p style=\"font-size:15px; line-height:1.6; color:#5d6675; margin:0;\">Беремся за дело, когда видим перспективу, и доводим его до результата.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- PRACTICE AREAS -->\n  <section id=\"practice\" style=\"background:#ffffff;\">\n    <div style=\"max-width:1180px; margin:0 auto; padding:100px 40px;\">\n      <div style=\"display:flex; align-items:flex-end; justify-content:space-between; gap:30px; margin-bottom:54px; flex-wrap:wrap;\">\n        <div>\n          <span style=\"font-size:12.5px; letter-spacing:3.4px; text-transform:uppercase; color:#9a7b3f;\">Услуги<\u002Fspan>\n          <h2 style=\"font-family:'Playfair Display',serif; font-weight:600; font-size:40px; line-height:1.15; color:#16202f; margin:18px 0 0;\">Направления практики<\u002Fh2>\n        <\u002Fdiv>\n        <p style=\"font-size:15.5px; line-height:1.6; color:#5d6675; max-width:380px; margin:0;\">Сопровождаем компании и собственников по ключевым направлениям корпоративного и судебного права.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"display:grid; grid-template-columns:var(--prac-cols, repeat(3, 1fr)); gap:24px;\">\n        <div style=\"border:1px solid #e6e0d4; padding:40px 34px; transition:transform .25s, border-color .25s;\" style-hover=\"transform:translateY(-3px); border-color:var(--accent,#c8a96a);\">\n          <span style=\"font-family:'Playfair Display',serif; font-size:20px; color:var(--accent,#c8a96a);\">01<\u002Fspan>\n          <h3 style=\"font-size:19px; font-weight:700; color:#16202f; margin:18px 0 12px;\">Корпоративное право и M&amp;A<\u002Fh3>\n          <p style=\"font-size:15px; line-height:1.62; color:#5d6675; margin:0;\">Структурирование бизнеса, сопровождение сделок, due diligence, корпоративные процедуры и соглашения участников.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"border:1px solid #e6e0d4; padding:40px 34px; transition:transform .25s, border-color .25s;\" style-hover=\"transform:translateY(-3px); border-color:var(--accent,#c8a96a);\">\n          <span style=\"font-family:'Playfair Display',serif; font-size:20px; color:var(--accent,#c8a96a);\">02<\u002Fspan>\n          <h3 style=\"font-size:19px; font-weight:700; color:#16202f; margin:18px 0 12px;\">Налоговое право<\u002Fh3>\n          <p style=\"font-size:15px; line-height:1.62; color:#5d6675; margin:0;\">Налоговое планирование, сопровождение проверок ФНС, оспаривание доначислений и споры в досудебном и судебном порядке.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"border:1px solid #e6e0d4; padding:40px 34px; transition:transform .25s, border-color .25s;\" style-hover=\"transform:translateY(-3px); border-color:var(--accent,#c8a96a);\">\n          <span style=\"font-family:'Playfair Display',serif; font-size:20px; color:var(--accent,#c8a96a);\">03<\u002Fspan>\n          <h3 style=\"font-size:19px; font-weight:700; color:#16202f; margin:18px 0 12px;\">Арбитраж и судебные споры<\u002Fh3>\n          <p style=\"font-size:15px; line-height:1.62; color:#5d6675; margin:0;\">Представительство в арбитражных судах всех инстанций, взыскание задолженности, защита по корпоративным и договорным спорам.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"border:1px solid #e6e0d4; padding:40px 34px; transition:transform .25s, border-color .25s;\" style-hover=\"transform:translateY(-3px); border-color:var(--accent,#c8a96a);\">\n          <span style=\"font-family:'Playfair Display',serif; font-size:20px; color:var(--accent,#c8a96a);\">04<\u002Fspan>\n          <h3 style=\"font-size:19px; font-weight:700; color:#16202f; margin:18px 0 12px;\">Банкротство<\u002Fh3>\n          <p style=\"font-size:15px; line-height:1.62; color:#5d6675; margin:0;\">Сопровождение процедур банкротства, защита интересов кредиторов и должников, оспаривание сделок, субсидиарная ответственность.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"border:1px solid #e6e0d4; padding:40px 34px; transition:transform .25s, border-color .25s;\" style-hover=\"transform:translateY(-3px); border-color:var(--accent,#c8a96a);\">\n          <span style=\"font-family:'Playfair Display',serif; font-size:20px; color:var(--accent,#c8a96a);\">05<\u002Fspan>\n          <h3 style=\"font-size:19px; font-weight:700; color:#16202f; margin:18px 0 12px;\">Недвижимость и строительство<\u002Fh3>\n          <p style=\"font-size:15px; line-height:1.62; color:#5d6675; margin:0;\">Сделки с недвижимостью, оформление и защита прав, сопровождение строительных проектов и споры с подрядчиками.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"border:1px solid #e6e0d4; padding:40px 34px; transition:transform .25s, border-color .25s;\" style-hover=\"transform:translateY(-3px); border-color:var(--accent,#c8a9
